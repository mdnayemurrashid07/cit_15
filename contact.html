<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container my-5">
<h1>Contact Us</h1>

<form onsubmit="return confirmSubmit()">
<input class="form-control mb-3" type="text" placeholder="Name" required>
<input class="form-control mb-3" type="email" placeholder="Email" required>
<textarea class="form-control mb-3" placeholder="Message"></textarea>
<button class="btn btn-primary">Submit</button>
</form>

<h3 class="mt-5">Contact Info</h3>
<p>Address: Dhaka, Bangladesh</p>
<p>Email: info@edu.com</p>
<p>Phone: +880123456</p>

</div>

<script src="js/script.js"></script>
</body>
</html>
